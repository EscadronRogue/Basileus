name: Bug report
description: Something is broken in the game, the simulator, or the multiplayer server.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough detail that someone else can reproduce it.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Game (single-player)
        - Multiplayer
        - Simulation Lab
        - Headless trainer
        - Engine / rules
        - AI personality
        - Build / CI / repo
        - Other
      default: 0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. Include screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: seed
    attributes:
      label: Seed (if reproducible from a specific seed)
      placeholder: e.g. 20260429
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 124 on Windows 11
  - type: input
    id: node
    attributes:
      label: Node version (if running locally)
      placeholder: "node --version"
  - type: textarea
    id: logs
    attributes:
      label: Console / server logs
      render: shell

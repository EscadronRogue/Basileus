name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt JS-based actions into Node 24 ahead of the June 2026 deprecation cutover.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Node 22+ is required because multiplayer/verify.js relies on the
        # global WebSocket (stable since Node 22.4). Node 20 is EOL.
        node: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Verify package.json
        run: node -e "JSON.parse(require('fs').readFileSync('package.json'))"

      - name: Engine smoke test
        run: npm run smoke:simulation

      - name: Multiplayer protocol verify
        run: npm run test:multiplayer

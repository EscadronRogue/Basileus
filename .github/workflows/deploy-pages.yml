name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node 24 for JS-based actions ahead of the June 2026 cutover so the
# deprecation warning goes away and we don't need a follow-up bump.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          # Copy everything the browser needs. Server-only Node scripts are
          # harmless to ship (they just don't execute), and simulator.html
          # imports simulation/app.js so we cannot exclude that folder wholesale.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.training-runs' \
            --exclude='start-local.bat' \
            --exclude='start-local.ps1' \
            ./ _site/
          # Disable Jekyll so files starting with _ or . are served as-is.
          touch _site/.nojekyll

      - name: Inject multiplayer backend URL
        env:
          MULTIPLAYER_BACKEND_URL: ${{ vars.MULTIPLAYER_BACKEND_URL }}
        run: |
          if [ -z "${MULTIPLAYER_BACKEND_URL}" ]; then
            echo "MULTIPLAYER_BACKEND_URL is not set; leaving the site on same-origin multiplayer."
            exit 0
          fi

          export MULTIPLAYER_BACKEND_URL
          node --input-type=module - <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const file = '_site/index.html';
          const url = process.env.MULTIPLAYER_BACKEND_URL.trim().replace(/\/+$/, '');
          const source = readFileSync(file, 'utf8');
          const target = '<meta name="basileus-multiplayer-url" content="">';
          const replacement = `<meta name="basileus-multiplayer-url" content="${url.replace(/"/g, '&quot;')}">`;

          if (!source.includes(target)) {
            throw new Error('multiplayer URL marker not found in index.html');
          }

          writeFileSync(file, source.replace(target, replacement));
          console.log(`Injected multiplayer backend: ${url}`);
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          # Auto-enable Pages on the repo if it's not already turned on, so the
          # very first deploy works without a manual visit to repo Settings.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

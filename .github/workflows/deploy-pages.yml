name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt into Node 24 for JS-based actions ahead of the June 2026 cutover so the
# deprecation warning goes away and we don't need a follow-up bump.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          # Copy everything the browser needs. Server-only Node scripts are
          # harmless to ship (they just don't execute), and simulator.html
          # imports simulation/app.js so we cannot exclude that folder wholesale.
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='node_modules' \
            --exclude='.training-runs' \
            --exclude='start-local.bat' \
            --exclude='start-local.ps1' \
            ./ _site/
          # Disable Jekyll so files starting with _ or . are served as-is.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the repo if it's not already turned on, so the
          # very first deploy works without a manual visit to repo Settings.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
